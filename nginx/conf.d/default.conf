server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php index.html;

    # 增加超时设置
    fastcgi_connect_timeout 300;
    fastcgi_send_timeout 300;
    fastcgi_read_timeout 300;

    # 禁止直接访问根路径，重定向到app
    location = / {
        return 301 /app/index.php?i=1&c=entry&a=site&m=mdkeji_im&do=Index&state=Index;
    }

    # 处理/web路径的PHP应用
    location = /web {
        # 直接重写到index.php，这样可以保持URL为/web
        rewrite ^ /index.php last;
    }

    # 处理/web/下的子路径
    location /web/ {
        # 移除/web前缀，转发到实际文件
        rewrite ^/web/(.*)$ /$1 last;
    }

    location ~.*.php($|/) {
        fastcgi_split_path_info ^(.+\.php)(.*)$;
        fastcgi_pass php:9000;  # Docker 中使用容器名:端口
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info; 
        include fastcgi_params;
    }

    # 代理博牛图片目录
    location /boniu_images/ {
        alias /var/www/html/boniu_images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";
        
        # 处理OPTIONS请求
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 200;
        }
    }

    # 如果需要 WebSocket 支持
    location /wss5 {
        proxy_pass http://php:9075;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ /\.ht {
        deny all;
    }

    # 在 Docker 中通常不需要设置自定义日志路径
    # access_log /var/log/nginx/access.log;
    # error_log /var/log/nginx/error.log;
}
