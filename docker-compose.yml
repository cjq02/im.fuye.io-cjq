services:
  # PHP 7.4 服务
  php:
    build:
      context: .
      dockerfile: Dockerfile
    image: sunphp-php:7.4
    container_name: sunphp-php
    volumes:
      - ./:/var/www/im.fuye.io
      - D:\me\epiboly\fuye\resource\img:/var/www/im.fuye.io/boniu
    environment:
      - TZ=Asia/Shanghai
      - PHP_IDE_CONFIG=serverName=im.fuye.io
      - XDEBUG_CONFIG=client_host=host.docker.internal
    ports:
      - "9000:9000" # PHP-FPM
      - "9075:9075" # WebSocket端口
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sunphp-network
    restart: no

  # Nginx 服务
  nginx:
    image: nginx:latest
    container_name: sunphp-nginx
    volumes:
      - ./:/var/www/im.fuye.io
      - ./nginx/conf.d:/etc/nginx/conf.d
    ports:
      - "80:80"
    depends_on:
      - php
    networks:
      - sunphp-network
    restart: no

networks:
  sunphp-network:
    name: sunphp-network
    driver: bridge

