services:
  # PHP 7.4 服务
  php:
    build:
      context: .
      dockerfile: Dockerfile
    image: sunphp-php:7.4
    container_name: sunphp-php
    volumes:
      - ./:/var/www/im.fuye.io
      - D:\me\epiboly\fuye\resource\img:/var/www/im.fuye.io/boniu
    environment:
      - TZ=Asia/Shanghai
      - PHP_IDE_CONFIG=serverName=im.fuye.io
      - XDEBUG_CONFIG=client_host=host.docker.internal
    ports:
      - "9000:9000" # PHP-FPM
      - "9075:9075" # WebSocket端口
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sunphp-network
    restart: no

  # MySQL 5.7 服务
  mysql:
    image: mysql:5.7
    container_name: sunphp-mysql
    volumes:
      - ./data/mysql:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=sunphp
      - TZ=Asia/Shanghai
    ports:
      - "3306:3306"
    command: >
      bash -c "
        chown -R mysql:mysql /var/lib/mysql && 
        chmod -R 755 /var/lib/mysql && 
        exec docker-entrypoint.sh mysqld
      "
    networks:
      - sunphp-network
    restart: no

  # Nginx 服务
  nginx:
    image: nginx:latest
    container_name: sunphp-nginx
    volumes:
      - ./:/var/www/im.fuye.io
      - ./nginx/conf.d:/etc/nginx/conf.d
    ports:
      - "80:80"
    depends_on:
      - php
    networks:
      - sunphp-network
    restart: no

networks:
  sunphp-network:
    driver: bridge

volumes:
  mysql_data:
