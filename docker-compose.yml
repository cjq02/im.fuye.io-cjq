services:
  # PHP 7.4 服务
  php:
    image: php:7.4-fpm
    container_name: sunphp-php
    volumes:
      - ./:/var/www/im.fuye.io
      - D:\me\epiboly\fuye\resource\img:/var/www/im.fuye.io/boniu
    environment:
      - TZ=Asia/Shanghai
      - PHP_IDE_CONFIG=serverName=im.fuye.io
      - XDEBUG_CONFIG=client_host=host.docker.internal
    ports:
      - "9000:9000" # PHP-FPM
      - "9075:9075" # WebSocket端口
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      bash -c "
        apt-get update && 
        apt-get install -y --fix-missing git zip unzip libzip-dev libpng-dev libfreetype6-dev libjpeg62-turbo-dev && 
        docker-php-ext-configure gd --with-freetype --with-jpeg && 
        docker-php-ext-install -j$(nproc) pdo pdo_mysql mysqli zip gd pcntl posix sockets &&
        # pecl install xdebug-3.1.5 || echo 'xdebug install failed, continuing...' &&
        # docker-php-ext-enable xdebug 2>/dev/null || echo 'xdebug enable failed, continuing...' &&
        # echo 'xdebug.mode=debug' >> /usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini 2>/dev/null || echo 'xdebug config failed, continuing...' &&
        # echo 'xdebug.start_with_request=yes' >> /usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini 2>/dev/null || echo 'xdebug config failed, continuing...' &&
        # echo 'xdebug.client_host=host.docker.internal' >> /usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini 2>/dev/null || echo 'xdebug config failed, continuing...' &&
        # echo 'xdebug.client_port=9003' >> /usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini 2>/dev/null || echo 'xdebug config failed, continuing...' &&
        # echo 'xdebug.log=/var/log/xdebug.log' >> /usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini 2>/dev/null || echo 'xdebug config failed, continuing...' &&
        # echo 'xdebug.idekey=CURSOR' >> /usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini 2>/dev/null || echo 'xdebug config failed, continuing...' &&
        echo 'exec=1' > /usr/local/etc/php/conf.d/docker-php-ext-exec.ini && 
        echo 'date.timezone = Asia/Shanghai' > /usr/local/etc/php/conf.d/timezone.ini && 
        echo 'disable_functions = ' > /usr/local/etc/php/conf.d/disable_functions.ini && 
        chown -R www-data:www-data /var/www/im.fuye.io && 
        mkdir -p /usr/local/etc/php && 
        echo 'max_execution_time = 300' > /usr/local/etc/php/conf.d/timeout.ini && 
        echo 'request_terminate_timeout = 300' > /usr/local/etc/php-fpm.d/timeout.conf && 
        echo 'display_errors = On' > /usr/local/etc/php/conf.d/display_errors.ini &&
        echo 'error_reporting = E_ALL' >> /usr/local/etc/php/conf.d/display_errors.ini &&
        echo 'upload_max_filesize = 100M' > /usr/local/etc/php/conf.d/upload.ini &&
        echo 'post_max_size = 100M' >> /usr/local/etc/php/conf.d/upload.ini &&
        echo 'max_execution_time = 300' >> /usr/local/etc/php/conf.d/upload.ini &&
        echo 'max_input_time = 300' >> /usr/local/etc/php/conf.d/upload.ini &&
        echo 'memory_limit = 256M' >> /usr/local/etc/php/conf.d/upload.ini &&
        php /var/www/im.fuye.io/addons/mdkeji_im/extend/GatewayWorker/start.php start -d && 
        php-fpm
      "
    networks:
      - sunphp-network
    restart: no

  # MySQL 5.7 服务
  mysql:
    image: mysql:5.7
    container_name: sunphp-mysql
    volumes:
      - ./data/mysql:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=sunphp
      - TZ=Asia/Shanghai
    ports:
      - "3306:3306"
    command: >
      bash -c "
        chown -R mysql:mysql /var/lib/mysql && 
        chmod -R 755 /var/lib/mysql && 
        exec docker-entrypoint.sh mysqld
      "
    networks:
      - sunphp-network
    restart: no

  # Nginx 服务
  nginx:
    image: nginx:latest
    container_name: sunphp-nginx
    volumes:
      - ./:/var/www/im.fuye.io
      - ./nginx/conf.d:/etc/nginx/conf.d
    ports:
      - "80:80"
    depends_on:
      - php
    networks:
      - sunphp-network
    restart: no

networks:
  sunphp-network:
    driver: bridge

volumes:
  mysql_data:
